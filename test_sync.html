<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Sync — Sistema IA</title>
<style>
  body { font-family: monospace; padding: 20px; background: #f5f5f5; }
  h2 { color: #333; }
  .test { background: white; border-radius: 8px; padding: 16px; margin: 12px 0; border-left: 4px solid #ccc; }
  .test.ok  { border-color: #1A7A3C; background: #EAF5EE; }
  .test.err { border-color: #C0392B; background: #FDEDEC; }
  .test.run { border-color: #2980B9; background: #EBF5FB; }
  .label { font-weight: bold; font-size: 14px; }
  .detail { font-size: 12px; margin-top: 6px; color: #555; word-break: break-all; }
  #resumen { font-size: 16px; font-weight: bold; padding: 12px; border-radius: 8px; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<h2>Diagnóstico de Sync — Sistema IA</h2>
<p style="font-size:12px;color:#666">Dispositivo: <span id="ua"></span></p>

<div id="tests"></div>
<div id="resumen"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzL-fFimZABJH9U4bvogx81e2Vm5T38SnBFR40y37_XhsyNmJsVIrAhZi46AhyEmiyDcA/exec';
document.getElementById('ua').textContent = navigator.userAgent;

function addTest(id, label) {
  const div = document.createElement('div');
  div.id = id;
  div.className = 'test run';
  div.innerHTML = '<div class="label">⏳ ' + label + '</div><div class="detail" id="' + id + '_d">ejecutando...</div>';
  document.getElementById('tests').appendChild(div);
}
function setResult(id, ok, detail) {
  const div = document.getElementById(id);
  div.className = 'test ' + (ok ? 'ok' : 'err');
  div.querySelector('.label').textContent = (ok ? '✅ ' : '❌ ') + div.querySelector('.label').textContent.slice(2);
  document.getElementById(id + '_d').textContent = detail;
}

async function runTests() {
  const ts = Date.now();

  // Test 1: Ping
  addTest('t1', 'Ping al servidor');
  try {
    const r = await fetch(GAS + '?artefacto=ping');
    const d = await r.json();
    setResult('t1', d.ok, JSON.stringify(d));
  } catch(e) { setResult('t1', false, 'Error: ' + e.message); }

  // Test 2: GET (CORS)
  addTest('t2', 'GET con CORS (lectura)');
  try {
    const r = await fetch(GAS + '?artefacto=briefing&clave=test_cors_check');
    const d = await r.json();
    setResult('t2', d.ok !== undefined, 'ok=' + d.ok + ' | data=' + JSON.stringify(d.data));
  } catch(e) { setResult('t2', false, 'Error CORS: ' + e.message); }

  // Test 3: POST mode:no-cors
  addTest('t3', 'POST con mode:no-cors (escritura)');
  const testKey = 'diag_' + ts;
  try {
    const r = await fetch(GAS, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'text/plain'},
      body: JSON.stringify({artefacto:'briefing', clave:testKey, valor:{msg:'desde ' + (navigator.userAgent.includes('iPhone') ? 'iPhone' : navigator.userAgent.includes('iPad') ? 'iPad' : 'Mac'), ts: new Date().toISOString()}})
    });
    setResult('t3', true, 'POST enviado (opaque response type=' + r.type + ')');
  } catch(e) { setResult('t3', false, 'Error: ' + e.message); }

  // Test 4: Verificar que el POST guardó
  addTest('t4', 'Verificar que POST guardó datos (GET posterior)');
  await new Promise(r => setTimeout(r, 2000));
  try {
    const r = await fetch(GAS + '?artefacto=briefing&clave=' + testKey);
    const d = await r.json();
    const guardado = d.ok && d.data && d.data.ts;
    setResult('t4', guardado, guardado ? 'Dato recuperado: ' + JSON.stringify(d.data) : 'No se encontró el dato: ' + JSON.stringify(d));
  } catch(e) { setResult('t4', false, 'Error: ' + e.message); }

  // Resumen
  const oks = document.querySelectorAll('.test.ok').length;
  const total = 4;
  const res = document.getElementById('resumen');
  if (oks === total) {
    res.style.cssText = 'background:#EAF5EE;color:#1A7A3C;padding:12px;border-radius:8px;margin-top:16px;text-align:center;font-size:16px;font-weight:bold;';
    res.textContent = '✅ Todo OK — el sync funciona en este dispositivo';
  } else {
    res.style.cssText = 'background:#FDEDEC;color:#C0392B;padding:12px;border-radius:8px;margin-top:16px;text-align:center;font-size:16px;font-weight:bold;';
    res.textContent = '❌ ' + (total - oks) + ' de ' + total + ' tests fallaron — revisar detalles';
  }
}

runTests();
</script>
</body>
</html>
